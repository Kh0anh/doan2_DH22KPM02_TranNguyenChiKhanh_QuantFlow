# ============================================================
# Nginx Server Block Configuration for QuantFlow
# ============================================================
# Author: Khanh
# Date: March 7, 2026
# Description: HTTP/HTTPS server blocks with routing, WebSocket upgrade, and security

# ===========================
# Health Check Endpoint
# ===========================
server {
    listen 80;
    server_name _;
    
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}

# ===========================
# HTTP Server Block (Port 80)
# ===========================
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name localhost;

    # Redirect to HTTPS in production (commented for development)
    # return 301 https://$host$request_uri;

    # ===========================
    # Security Headers
    # ===========================
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # ===========================
    # Backend API Routes (/api/*)
    # ===========================
    location /api/ {
        # Rate limiting for API endpoints
        limit_req zone=api_limit burst=20 nodelay;
        limit_conn conn_limit 10;

        # Proxy to Go Backend
        proxy_pass http://backend;
        proxy_http_version 1.1;

        # Proxy Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        # Cookie forwarding (critical for JWT HttpOnly cookies)
        proxy_pass_request_headers on;
        proxy_set_header Cookie $http_cookie;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Buffer settings
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;

        # Disable caching for API
        proxy_no_cache 1;
        proxy_cache_bypass 1;
    }

    # Special rate limit for login endpoint
    location /api/v1/auth/login {
        limit_req zone=login_limit burst=3 nodelay;
        
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ===========================
    # WebSocket Route (/ws/v1)
    # ===========================
    location /ws/v1 {
        # Proxy to Go Backend WebSocket handler
        proxy_pass http://backend;
        proxy_http_version 1.1;

        # WebSocket Upgrade Headers
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Standard Proxy Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Cookie forwarding for WebSocket authentication
        proxy_set_header Cookie $http_cookie;

        # WebSocket Timeouts (long-lived connections)
        proxy_connect_timeout 7d;
        proxy_send_timeout 7d;
        proxy_read_timeout 7d;

        # Disable buffering for WebSocket
        proxy_buffering off;

        # Access log for WebSocket debugging
        access_log /var/log/nginx/websocket.log websocket;
    }

    # ===========================
    # Frontend Routes (/)
    # ===========================
    location / {
        # Proxy to Next.js Frontend
        proxy_pass http://frontend;
        proxy_http_version 1.1;

        # Proxy Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Cookie forwarding
        proxy_pass_request_headers on;
        proxy_set_header Cookie $http_cookie;

        # Next.js HMR (Hot Module Replacement) in development
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            proxy_pass http://frontend;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # ===========================
    # Next.js HMR (Hot Module Replacement) — Development
    # ===========================
    # Turbopack uses /_next/turbopack-hmr, Webpack uses /_next/webpack-hmr.
    # These are WebSocket/EventSource endpoints that MUST NOT be cached
    # and need long-lived connections.  Without this block the generic
    # /_next/ rule below applies "expires 1y" to HMR too, which breaks
    # the persistent connection and causes the browser to do a full
    # page reload instead of a hot update.
    location ~ ^/_next/(turbopack|webpack)-hmr {
        proxy_pass http://frontend;
        proxy_http_version 1.1;

        # WebSocket upgrade
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Long-lived connection (24h) — HMR stays open for the session
        proxy_connect_timeout 7d;
        proxy_send_timeout 7d;
        proxy_read_timeout 7d;

        # No buffering or caching for real-time events
        proxy_buffering off;
        proxy_no_cache 1;
        proxy_cache_bypass 1;
    }

    # ===========================
    # Next.js static assets (/_next/static/*)
    # ===========================
    location /_next/ {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ===========================
    # Error Pages
    # ===========================
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        return 502 "Backend service unavailable. Please try again later.\n";
        add_header Content-Type text/plain;
    }
}

# ===========================
# HTTPS Server Block (Port 443)
# ===========================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name localhost;

    # ===========================
    # SSL Configuration
    # ===========================
    # Self-signed certificate for development
    # Production: Replace with Let's Encrypt certificates
    ssl_certificate /etc/nginx/ssl/server.crt;
    ssl_certificate_key /etc/nginx/ssl/server.key;

    # SSL Security Settings (Mozilla Intermediate Configuration)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;

    # HSTS (HTTP Strict Transport Security)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # ===========================
    # Backend API Routes (HTTPS)
    # ===========================
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        limit_conn conn_limit 10;

        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Cookie $http_cookie;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # ===========================
    # WebSocket Route (WSS)
    # ===========================
    location /ws/v1 {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Cookie $http_cookie;

        proxy_connect_timeout 7d;
        proxy_send_timeout 7d;
        proxy_read_timeout 7d;
        proxy_buffering off;
    }

    # ===========================
    # Frontend Routes (HTTPS)
    # ===========================
    location / {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Cookie $http_cookie;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
