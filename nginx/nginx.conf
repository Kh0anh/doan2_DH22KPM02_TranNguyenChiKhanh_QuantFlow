# ============================================================
# Nginx Main Configuration File
# ============================================================
# Author: Khanh
# Date: March 7, 2026
# Project: QuantFlow
# Description: Main nginx configuration with worker settings and upstream definitions

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

# Load dynamic modules
include /usr/share/nginx/modules/*.conf;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    # ===========================
    # Basic Settings
    # ===========================
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ===========================
    # Logging Configuration
    # ===========================
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    log_format websocket '$remote_addr - $remote_user [$time_local] '
                         '"$request" $status $body_bytes_sent '
                         '"$http_sec_websocket_key" "$http_upgrade" '
                         '"$http_connection"';

    access_log /var/log/nginx/access.log main;

    # ===========================
    # Performance Optimization
    # ===========================
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 20M;  # Max upload size for strategy JSON import

    # ===========================
    # Gzip Compression
    # ===========================
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript 
               application/json application/javascript application/xml+rss 
               application/rss+xml font/truetype font/opentype 
               application/vnd.ms-fontobject image/svg+xml;
    gzip_disable "msie6";

    # ===========================
    # Security Headers (Global)
    # ===========================
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ===========================
    # Upstream Definitions
    # ===========================
    upstream backend {
        server backend:8080 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream frontend {
        server frontend:3000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # ===========================
    # Rate Limiting Zones
    # ===========================
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;
    limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # ===========================
    # Include Server Blocks
    # ===========================
    include /etc/nginx/conf.d/*.conf;
}
