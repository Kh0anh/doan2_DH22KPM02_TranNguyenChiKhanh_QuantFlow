# ============================================================
# Docker Compose Production Override for QuantFlow
# ============================================================
# Author: Khanh
# Date: March 7, 2026
# Version: 1.0
# Usage: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# Description: Production-specific configurations with multi-stage builds

version: '3.9'

services:
  # ===========================
  # PostgreSQL Database Service (Production)
  # ===========================
  postgres:
    # Remove port exposure in production (only internal network access)
    ports: []
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}  # Must be set in .env (no default)
    # Production backup volume
    volumes:
      - quantflow-postgres-data:/var/lib/postgresql/data
      - ./backups:/backups:rw

  # ===========================
  # Go Backend Service (Production)
  # ===========================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
      args:
        GO_VERSION: "1.24"
    image: quantflow-backend:latest
    # Override command to use compiled binary
    command: ./quantflow-backend
    # Remove port exposure (only nginx access)
    ports: []
    environment:
      GO_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB}
      DB_SSLMODE: require
      JWT_SECRET: ${JWT_SECRET}  # Must be strong in production
      AES_KEY: ${AES_KEY}        # Must be 32 bytes exactly
      BINANCE_API_BASE: ${BINANCE_API_BASE:-https://fapi.binance.com}
      SERVER_PORT: 8080
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    # Remove bind mount, use built image
    volumes: []
    healthcheck:
      interval: 60s
      timeout: 10s
      retries: 3

  # ===========================
  # Next.js Frontend Service (Production)
  # ===========================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
      args:
        NODE_VERSION: "22"
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL}
    image: quantflow-frontend:latest
    # Override command to use production server
    command: npm start
    # Remove port exposure (only nginx access)
    ports: []
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL}
      PORT: 3000
    # Remove bind mount, use built image
    volumes: []
    healthcheck:
      interval: 60s
      timeout: 10s
      retries: 3

  # ===========================
  # Nginx Reverse Proxy Service (Production)
  # ===========================
  nginx:
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx-cache:/var/cache/nginx
      - nginx-logs:/var/log/nginx
    healthcheck:
      interval: 60s
      timeout: 5s
      retries: 3

# ===========================
# Production Volumes
# ===========================
volumes:
  nginx-logs:
    driver: local
    name: quantflow-nginx-logs
