# ============================================================
# Docker Compose Configuration for QuantFlow (Development)
# ============================================================
# Author: Khanh
# Date: March 7, 2026
# Version: 1.0
# Description: Development environment orchestration
#              4 services: PostgreSQL, Go Backend, Next.js Frontend, Nginx

version: '3.9'

services:
  # ===========================
  # PostgreSQL Database Service
  # ===========================
  postgres:
    image: postgres:16-alpine
    container_name: quantflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-quantflow_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-quantflow_secure_password_2026}
      POSTGRES_DB: ${POSTGRES_DB:-quantflow_db}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    volumes:
      - quantflow-postgres-data:/var/lib/postgresql/data
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
      - ./docs/database/schema.sql:/tmp/schema.sql:ro
    ports:
      - "5432:5432"  # Exposed for local DB client access (remove in production)
    networks:
      - quantflow-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-quantflow_user} -d ${POSTGRES_DB:-quantflow_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ===========================
  # Go Backend Service
  # ===========================
  backend:
    image: golang:1.26.1-alpine
    container_name: quantflow-backend
    restart: unless-stopped
    working_dir: /app
    command: sh -c "go mod download && go run cmd/server/main.go"
    environment:
      GO_ENV: ${GO_ENV:-development}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER:-quantflow_user}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-quantflow_secure_password_2026}
      DB_NAME: ${POSTGRES_DB:-quantflow_db}
      DB_SSLMODE: disable
      JWT_SECRET: ${JWT_SECRET:-your_jwt_secret_key_min_32_chars_development_only}
      AES_KEY: ${AES_KEY:-your_aes_256_key_32_bytes_exactly}
      BINANCE_API_BASE: ${BINANCE_API_BASE:-https://fapi.binance.com}
      SERVER_PORT: 8080
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost,http://localhost:3000}
      WATCHED_SYMBOLS: ${WATCHED_SYMBOLS:-BTCUSDT,ETHUSDT,SOLUSDT,BNBUSDT}
    volumes:
      - ./backend:/app
      - go-mod-cache:/go/pkg/mod
    ports:
      - "8080:8080"  # Exposed for direct API access (proxied via nginx)
    networks:
      - quantflow-network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ===========================
  # Next.js Frontend Service
  # ===========================
  frontend:
    image: node:22-alpine
    container_name: quantflow-frontend
    restart: unless-stopped
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost/api/v1}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost/ws}
      PORT: 3000
    volumes:
      - ./frontend:/app
      - node-modules-cache:/app/node_modules
      - nextjs-cache:/app/.next
    ports:
      - "3000:3000"  # Exposed for direct access (proxied via nginx)
    networks:
      - quantflow-network
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ===========================
  # Nginx Reverse Proxy Service
  # ===========================
  nginx:
    image: nginx:1.26-alpine
    container_name: quantflow-nginx
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx-cache:/var/cache/nginx
    ports:
      - "80:80"    # HTTP
      - "443:443"  # HTTPS
    networks:
      - quantflow-network
    depends_on:
      - backend
      - frontend
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# ===========================
# Networks
# ===========================
networks:
  quantflow-network:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.25.0.0/16

# ===========================
# Volumes
# ===========================
volumes:
  quantflow-postgres-data:
    driver: local
    name: quantflow-postgres-data
  go-mod-cache:
    driver: local
  node-modules-cache:
    driver: local
  nextjs-cache:
    driver: local
  nginx-cache:
    driver: local
