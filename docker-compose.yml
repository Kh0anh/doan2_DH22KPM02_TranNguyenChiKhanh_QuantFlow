# ============================================================
# Docker Compose - QuantFlow (Môi trường phát triển)
# ============================================================
# Tác giả: Khanh
# Dự án:   QuantFlow
# Mô tả:   Điều phối 4 dịch vụ: PostgreSQL, Go Backend, Next.js Frontend, Nginx
#
# Khởi động:
#   cp .env.example .env
#   docker compose up -d
# ============================================================

services:
  # =====================================================
  # CƠ SỞ DỮ LIỆU - PostgreSQL
  # =====================================================
  postgres:
    image: postgres:16-alpine
    container_name: quantflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-123}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    volumes:
      - quantflow-postgres-data:/var/lib/postgresql/data
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
      - ./docs/database/schema.sql:/tmp/schema.sql:ro
    ports:
      - "5432:5432"  # Mở cho truy cập DB cục bộ (bỏ khi production)
    networks:
      - quantflow-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # =====================================================
  # BACKEND - Go API Server
  # =====================================================
  backend:
    image: golang:1.25-alpine
    container_name: quantflow-backend
    restart: unless-stopped
    working_dir: /app
    command: sh -c "go mod download && go run cmd/server/main.go"
    environment:
      GO_ENV: ${GO_ENV:-development}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-123}
      DB_NAME: ${POSTGRES_DB:-postgres}
      DB_SSLMODE: disable
      JWT_SECRET: ${JWT_SECRET:-081f0a7bd0b61ecbe1e1ed68a99b3e01f6ecee328999d059b81fe60817eba6a3}
      AES_KEY: ${AES_KEY:-53e17d6c41f81ad01897c18032d4f5f7!!}
      BINANCE_API_BASE: ${BINANCE_API_BASE:-https://demo-fapi.binance.com}
      SERVER_PORT: 8080
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost,http://localhost:3000}
      WATCHED_SYMBOLS: ${WATCHED_SYMBOLS:-BTCUSDT,ETHUSDT,SOLUSDT,BNBUSDT}
    volumes:
      - ./backend:/app
      - go-mod-cache:/go/pkg/mod
    ports:
      - "8080:8080"  # Mở cho truy cập API trực tiếp (proxy qua Nginx)
    networks:
      - quantflow-network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # =====================================================
  # FRONTEND - Next.js
  # =====================================================
  frontend:
    image: node:22-alpine
    container_name: quantflow-frontend
    restart: unless-stopped
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost/api/v1}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost/ws}
      PORT: 3000
    volumes:
      - ./frontend:/app
      - node-modules-cache:/app/node_modules
      - nextjs-cache:/app/.next
    ports:
      - "3000:3000"  # Mở cho truy cập trực tiếp (proxy qua Nginx)
    networks:
      - quantflow-network
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # =====================================================
  # NGINX - Reverse Proxy
  # =====================================================
  nginx:
    image: nginx:1.26-alpine
    container_name: quantflow-nginx
    restart: unless-stopped
    # Tu dong tao chung chi SSL tu ky neu chua co
    entrypoint: /bin/sh -c "
      if [ ! -f /etc/nginx/ssl/server.crt ]; then
        echo '[QuantFlow] Dang tao chung chi SSL tu ky...';
        apk add --no-cache openssl > /dev/null 2>&1;
        mkdir -p /etc/nginx/ssl;
        openssl req -x509 -nodes -days 365 -newkey rsa:2048
          -keyout /etc/nginx/ssl/server.key
          -out /etc/nginx/ssl/server.crt
          -subj '/C=VN/ST=CanTho/L=CanTho/O=QuantFlow/OU=Dev/CN=localhost' 2>/dev/null;
        echo '[QuantFlow] Chung chi SSL da duoc tao thanh cong!';
      fi;
      exec nginx -g 'daemon off;'
      "
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl
      - nginx-cache:/var/cache/nginx
    ports:
      - "80:80"    # HTTP
      - "443:443"  # HTTPS
    networks:
      - quantflow-network
    depends_on:
      - backend
      - frontend
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# =====================================================
# MANG (Networks)
# =====================================================
networks:
  quantflow-network:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.25.0.0/16

# =====================================================
# O DIA (Volumes)
# =====================================================
volumes:
  quantflow-postgres-data:
    driver: local
    name: quantflow-postgres-data
  go-mod-cache:
    driver: local
  node-modules-cache:
    driver: local
  nextjs-cache:
    driver: local
  nginx-cache:
    driver: local
