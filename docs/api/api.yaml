openapi: "3.0.3"

info:
  title: QuantFlow API Document V1.0
  version: "1.0.0"
  description: |
    ## Tổng quan

    Tài liệu đặc tả RESTful API cho dự án **QuantFlow** — nền tảng Low-code hỗ trợ xây dựng
    và vận hành chiến lược giao dịch tiền mã hóa tự động trên sàn giao dịch tập trung (CEX),
    cụ thể là Binance Futures.

    Hệ thống cung cấp:
    - Môi trường lập trình trực quan (Drag-and-drop) sử dụng Google Blockly.
    - Quản lý mẫu chiến lược giao dịch (CRUD, Import/Export JSON).
    - Backtest chiến lược trên dữ liệu lịch sử.
    - Khởi tạo và điều khiển Bot giao dịch tự động trên thị trường thật.
    - Giám sát trạng thái Bot, PnL, vị thế và nhật ký hoạt động theo thời gian thực.

    ## Cơ chế Xác thực (Authentication)

    Hệ thống sử dụng **JWT (JSON Web Token)** kết hợp **HttpOnly Cookie** để bảo vệ phiên
    làm việc. Mô hình đơn người dùng (Single User / Admin).

    **Luồng hoạt động:**
    1. Gửi request `POST /api/v1/auth/login` với thông tin đăng nhập.
    2. Backend tạo JWT Token và gắn vào **HttpOnly Cookie** (`Set-Cookie`).
    3. Trình duyệt tự động gửi Cookie trong mọi request tiếp theo.
    4. Token hết hạn sau **24 giờ**, người dùng cần đăng nhập lại.

    **Đặc tính bảo mật Cookie:**
    - `HttpOnly` — JavaScript phía Client không đọc được (chống XSS).
    - `Secure` — Chỉ gửi qua HTTPS (Production).
    - `SameSite=Lax` — Giảm thiểu CSRF.

    ## Quy chuẩn Header

    | Header         | Giá trị            | Mô tả                                                |
    |:---------------|:-------------------|:------------------------------------------------------|
    | `Content-Type` | `application/json` | Bắt buộc cho request có Body (POST, PUT, PATCH).      |
    | `Accept`       | `application/json` | Quy định kiểu dữ liệu phản hồi mong muốn.            |

    ## Cấu trúc Response lỗi chuẩn

    ```json
    {
      "error": {
        "code": "ERROR_CODE",
        "message": "Mô tả lỗi chi tiết."
      }
    }
    ```

  license:
    name: GPLv3
    url: https://github.com/Kh0anh/doan2_DH22KPM02_TranNguyenChiKhanh_QuantFlow/blob/docs/init-api/LICENSE

servers:
  - url: http://localhost:8080/api/v1
    description: Dev Server

tags:
  - name: Authentication
    description: Quản lý xác thực phiên làm việc (Đăng nhập, Đăng xuất, Kiểm tra phiên). Hệ thống áp dụng mô hình đơn người dùng (Single User / Admin).
  - name: Account
    description: Quản lý thông tin tài khoản người dùng (Cập nhật Username, Password). Mọi thay đổi thông tin nhạy cảm yêu cầu xác thực bằng mật khẩu hiện tại.
  - name: Exchange
    description: >-
      Quản lý cấu hình kết nối sàn giao dịch (Binance). Secret Key là Write-Only —
      tuyệt đối không trả về plain-text trong bất kỳ Response nào. Endpoint GET chỉ trả về
      trạng thái và API Key đã che (Masking ******). Secret Key được mã hóa AES-256-GCM
      trước khi lưu vào Database.
  - name: Strategies
    description: >-
      CRUD mẫu chiến lược giao dịch. Chiến lược được thiết kế dưới dạng khối logic
      Google Blockly và lưu trữ ở định dạng JSON (JSONB). Hỗ trợ Import/Export JSON,
      quản lý phiên bản (Versioning) và kiểm tra ràng buộc toàn vẹn dữ liệu trước khi xóa.
  - name: Backtests
    description: >-
      Thực thi mô phỏng chiến lược giao dịch trên dữ liệu nến lịch sử. Request bao gồm
      đầy đủ tham số cấu hình giả lập: Strategy ID, Symbol, Timeframe, Time Range,
      Vốn ban đầu (Initial Capital), Phí giao dịch (Fee) và giới hạn Unit.
  - name: Bots
    description: >-
      Quản lý phiên bản thực thi Bot (Bot Instance). Bot được khởi tạo từ mẫu chiến lược,
      thực hiện Snapshot (Deep Copy) logic tại thời điểm tạo. Sửa chiến lược gốc không
      ảnh hưởng Bot đang chạy. Điều khiển Start/Stop và giám sát trạng thái Bot.
  - name: Trades
    description: >-
      Truy xuất lịch sử giao dịch đã hoàn tất (Realized). Dữ liệu trích xuất từ Database
      phục vụ đối soát phí và lợi nhuận thực tế. Bắt buộc hỗ trợ phân trang và lọc
      theo Bot ID, Symbol.
  - name: Market
    description: >-
      Cung cấp dữ liệu thị trường (Market Watch, biểu đồ nến OHLCV). Dữ liệu giá được
      Backend nhận từ sàn Binance, xử lý và cung cấp cho Frontend thông qua các REST API.

security:
  - cookieAuth: []

paths:
  /auth/login:
    post:
      tags:
        - Authentication
      operationId: login
      summary: Đăng nhập hệ thống
      description: |
        Xác thực thông tin đăng nhập. Hệ thống so sánh mật khẩu đã băm (BCrypt/Argon2)
        trong cơ sở dữ liệu.

        **Quy tắc nghiệp vụ — Brute-force Protection:**
        Nếu nhập sai **quá 5 lần liên tiếp**, tài khoản bị **khóa 15 phút**. Bộ đếm số lần
        sai được reset về 0 khi đăng nhập thành công. Trong thời gian khóa, mọi request
        đăng nhập đều bị từ chối với mã lỗi `403 Forbidden`.

        Đăng nhập thành công tạo JWT Token và gắn vào HttpOnly Cookie (Max-Age: 24 giờ).
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
            example:
              username: "admin"
              password: "MySecureP@ssw0rd"
      responses:
        "200":
          description: >-
            Đăng nhập thành công. JWT Token được gắn vào HttpOnly Cookie
            (`Set-Cookie: token=<JWT>; HttpOnly; Secure; SameSite=Lax; Path=/; Max-Age=86400`).
          headers:
            Set-Cookie:
              schema:
                type: string
                example: "token=eyJhbGciOi...; HttpOnly; Secure; SameSite=Lax; Path=/; Max-Age=86400"
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Đăng nhập thành công."
                  data:
                    type: object
                    properties:
                      user:
                        $ref: "#/components/schemas/UserBasic"
        "401":
          description: >-
            Sai tên đăng nhập hoặc mật khẩu. Trả về số lần thử còn lại (`remaining_attempts`).
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ErrorResponse"
                  - type: object
                    properties:
                      error:
                        type: object
                        properties:
                          remaining_attempts:
                            type: integer
                            example: 3
              example:
                error:
                  code: "INVALID_CREDENTIALS"
                  message: "Tên đăng nhập hoặc mật khẩu không chính xác."
                  remaining_attempts: 3
        "403":
          description: >-
            Tài khoản bị khóa do nhập sai quá 5 lần liên tiếp. Trả về thời điểm mở khóa.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ErrorResponse"
                  - type: object
                    properties:
                      error:
                        type: object
                        properties:
                          locked_until:
                            type: string
                            format: date-time
              example:
                error:
                  code: "ACCOUNT_LOCKED"
                  message: "Bạn đã nhập sai quá nhiều lần. Vui lòng thử lại sau 15 phút."
                  locked_until: "2026-02-28T15:30:00Z"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /auth/logout:
    post:
      tags:
        - Authentication
      operationId: logout
      summary: Đăng xuất hệ thống
      description: |
        Đăng xuất khỏi hệ thống. Backend xóa Cookie phiên làm việc, vô hiệu hóa JWT Token
        hiện tại. Cookie được ghi đè với `Max-Age=0` để trình duyệt tự động xóa.
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Đăng xuất thành công. Cookie phiên bị xóa.
          headers:
            Set-Cookie:
              schema:
                type: string
                example: "token=; HttpOnly; Secure; SameSite=Lax; Path=/; Max-Age=0"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
              example:
                message: "Đăng xuất thành công."
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/me:
    get:
      tags:
        - Authentication
      operationId: getCurrentUser
      summary: Lấy thông tin phiên đăng nhập hiện tại
      description: |
        Lấy thông tin người dùng đang đăng nhập. Frontend gọi endpoint này khi khởi tạo
        ứng dụng để kiểm tra trạng thái phiên làm việc (Session Validation).
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Trả về thông tin người dùng hiện tại.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      user:
                        $ref: "#/components/schemas/UserProfile"
              example:
                data:
                  user:
                    id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                    username: "admin"
                    created_at: "2026-01-15T08:00:00Z"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/refresh:
    post:
      tags:
        - Authentication
      operationId: refreshToken
      summary: Làm mới phiên đăng nhập (Refresh Token)
      description: |
        Làm mới JWT Token trước khi phiên hiện tại hết hạn, giúp người dùng duy trì
        phiên làm việc liên tục mà không bị buộc phải đăng nhập lại.

        **Luồng hoạt động:**
        1. Frontend gọi endpoint này khi phát hiện Token sắp hết hạn (ví dụ: còn dưới
           5 phút trước khi hết hạn 24 giờ).
        2. Backend xác thực Token hiện tại từ Cookie. Nếu Token còn hợp lệ, hệ thống
           tạo một JWT Token mới với thời hạn 24 giờ kể từ thời điểm hiện tại.
        3. Token mới được gắn vào HttpOnly Cookie thay thế Token cũ.

        **Quy tắc nghiệp vụ:**
        - Chỉ chấp nhận làm mới khi Token hiện tại **chưa hết hạn**. Nếu Token đã hết hạn,
          trả về `401 Unauthorized` và người dùng phải đăng nhập lại.
        - Token cũ bị vô hiệu hóa ngay sau khi Token mới được cấp (Token Rotation).
      security:
        - cookieAuth: []
      responses:
        "200":
          description: >-
            Làm mới phiên thành công. JWT Token mới được gắn vào HttpOnly Cookie
            (`Set-Cookie: token=<NEW_JWT>; HttpOnly; Secure; SameSite=Lax; Path=/; Max-Age=86400`).
          headers:
            Set-Cookie:
              schema:
                type: string
                example: "token=eyJhbGciOi...; HttpOnly; Secure; SameSite=Lax; Path=/; Max-Age=86400"
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      expires_at:
                        type: string
                        format: date-time
                        description: Thời điểm hết hạn của Token mới.
              example:
                message: "Làm mới phiên thành công."
                data:
                  expires_at: "2026-03-01T10:30:00Z"
        "401":
          description: >-
            Token hiện tại đã hết hạn hoặc không hợp lệ. Người dùng phải đăng nhập lại.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  code: "SESSION_EXPIRED"
                  message: "Phiên làm việc đã hết hạn. Vui lòng đăng nhập lại."
        "500":
          $ref: "#/components/responses/InternalServerError"

  /account/profile:
    put:
      tags:
        - Account
      operationId: updateProfile
      summary: Cập nhật thông tin tài khoản
      description: |
        Cập nhật thông tin tài khoản (Tên đăng nhập và/hoặc Mật khẩu). Người dùng **bắt
        buộc** phải cung cấp `current_password` để xác thực quyền sở hữu, chống chiếm đoạt
        phiên (Session Hijacking).

        **Quy tắc nghiệp vụ:**
        - Ít nhất một trong hai trường `new_username` hoặc `new_password` phải được cung cấp.
        - Nếu cung cấp `new_password`, trường `confirm_password` là bắt buộc và phải trùng khớp.
        - Sau khi cập nhật thành công, hệ thống **cưỡng chế đăng xuất** (Force Logout):
          Cookie phiên bị xóa, Token cũ bị vô hiệu hóa. Người dùng phải đăng nhập lại
          với thông tin mới.
        - Mật khẩu mới được băm (hash) bằng BCrypt trước khi lưu vào Database.
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileRequest"
            examples:
              changeAll:
                summary: Đổi cả Username và Password
                value:
                  current_password: "MySecureP@ssw0rd"
                  new_username: "khanh_trader"
                  new_password: "N3wStr0ngP@ss!"
                  confirm_password: "N3wStr0ngP@ss!"
              changePasswordOnly:
                summary: Chỉ đổi Password
                value:
                  current_password: "MySecureP@ssw0rd"
                  new_password: "N3wStr0ngP@ss!"
                  confirm_password: "N3wStr0ngP@ss!"
              changeUsernameOnly:
                summary: Chỉ đổi Username
                value:
                  current_password: "MySecureP@ssw0rd"
                  new_username: "khanh_trader"
      responses:
        "200":
          description: >-
            Cập nhật thành công. Cookie phiên bị xóa (Force Logout). Người dùng cần
            đăng nhập lại với thông tin mới.
          headers:
            Set-Cookie:
              schema:
                type: string
                example: "token=; HttpOnly; Secure; SameSite=Lax; Path=/; Max-Age=0"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
              example:
                message: "Cập nhật thành công. Vui lòng đăng nhập lại."
        "400":
          description: Dữ liệu đầu vào không hợp lệ (thiếu trường, mật khẩu xác nhận không khớp).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                passwordMismatch:
                  summary: Mật khẩu xác nhận không khớp
                  value:
                    error:
                      code: "PASSWORD_MISMATCH"
                      message: "Mật khẩu xác nhận không trùng khớp."
                missingFields:
                  summary: Thiếu trường thay đổi
                  value:
                    error:
                      code: "MISSING_CHANGE_FIELDS"
                      message: "Vui lòng cung cấp ít nhất new_username hoặc new_password."
        "401":
          description: Sai mật khẩu hiện tại hoặc phiên làm việc hết hạn.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  code: "INVALID_CURRENT_PASSWORD"
                  message: "Mật khẩu hiện tại không chính xác. Vui lòng thử lại."
        "500":
          $ref: "#/components/responses/InternalServerError"

  /exchange/api-keys:
    post:
      tags:
        - Exchange
      operationId: saveApiKeys
      summary: Lưu hoặc cập nhật cấu hình API Key sàn
      description: |
        Lưu hoặc cập nhật cặp khóa API kết nối với sàn Binance. Trước khi lưu, Backend gửi
        request thử nghiệm (Ping/Account Info) đến Binance API để xác thực tính đúng đắn
        và quyền hạn của Key (bắt buộc bật quyền Futures Trading).

        **Quy tắc nghiệp vụ:**
        - Secret Key được mã hóa **AES-256-GCM** trước khi ghi vào Database.
        - Secret Key là **Write-Only**: hệ thống chỉ cho phép nhập, tuyệt đối không trả về
          plain-text Secret Key trong bất kỳ Response nào.
        - Nếu đã có cấu hình trước đó, thao tác này sẽ ghi đè cặp Key cũ.
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveApiKeysRequest"
            example:
              exchange: "Binance"
              api_key: "vmPUZE6mv9SD5VNHk4HlWFsOr6aKE2zvsw0MuIgwCIPy6utIco14y7Ju91duEh8A"
              secret_key: "NhqPtmdSJYdKjVHjA7PZj4Mge3R5YNiP1e3UZjInClVN65XAbvqqM6A7H5fATj0j"
      responses:
        "201":
          description: Kết nối sàn thành công. API Key được lưu vào Database (Secret Key đã mã hóa).
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  data:
                    $ref: "#/components/schemas/ApiKeyInfo"
              example:
                message: "Kết nối sàn thành công."
                data:
                  id: "b2c3d4e5-f6a7-8901-bcde-f12345678901"
                  exchange: "Binance"
                  api_key_masked: "****************************Eh8A"
                  status: "Connected"
                  created_at: "2026-02-28T10:00:00Z"
        "400":
          description: Định dạng API Key không hợp lệ (thiếu ký tự, khoảng trắng thừa).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  code: "INVALID_KEY_FORMAT"
                  message: "Vui lòng kiểm tra lại định dạng API Key."
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          description: >-
            Sàn Binance từ chối xác thực — API Key không hợp lệ, sai IP whitelist,
            hoặc chưa bật quyền Futures Trading.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  code: "EXCHANGE_VALIDATION_FAILED"
                  message: "API Key không hợp lệ hoặc thiếu quyền hạn Futures Trading."
        "500":
          $ref: "#/components/responses/InternalServerError"

    get:
      tags:
        - Exchange
      operationId: getApiKeys
      summary: Lấy thông tin cấu hình API Key hiện tại
      description: |
        Lấy thông tin cấu hình API hiện tại. **Secret Key tuyệt đối không được trả về.**
        Chỉ trả về trạng thái kết nối và API Key đã che (Masking: hiển thị 4 ký tự cuối,
        phần còn lại thay bằng dấu `*`).

        Nếu chưa cấu hình, trả về `data: null`.
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Trả về thông tin cấu hình API (đã Masking) hoặc `null` nếu chưa cấu hình.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    nullable: true
                    allOf:
                      - $ref: "#/components/schemas/ApiKeyInfo"
              examples:
                configured:
                  summary: Đã cấu hình API Key
                  value:
                    data:
                      id: "b2c3d4e5-f6a7-8901-bcde-f12345678901"
                      exchange: "Binance"
                      api_key_masked: "****************************Eh8A"
                      status: "Connected"
                      updated_at: "2026-02-28T10:00:00Z"
                notConfigured:
                  summary: Chưa cấu hình
                  value:
                    data: null
        "401":
          $ref: "#/components/responses/Unauthorized"

    delete:
      tags:
        - Exchange
      operationId: deleteApiKeys
      summary: Xóa cấu hình API Key
      description: |
        Xóa cấu hình khóa API hiện tại. Hệ thống xóa hoàn toàn bản ghi API Key (bao gồm
        cả Secret Key đã mã hóa) khỏi Database. Sau khi xóa, trạng thái chuyển về
        "Chưa kết nối".

        **Ràng buộc:** Không thể xóa cấu hình khi còn Bot đang chạy (trạng thái `Running`).
        Phải dừng tất cả Bot trước khi xóa.
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Đã xóa cấu hình kết nối sàn.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
              example:
                message: "Đã xóa cấu hình kết nối sàn."
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          description: Không thể xóa cấu hình khi còn Bot đang chạy.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  code: "ACTIVE_BOTS_EXIST"
                  message: "Không thể xóa cấu hình khi còn Bot đang chạy. Vui lòng dừng tất cả Bot trước."
        "500":
          $ref: "#/components/responses/InternalServerError"

  /strategies:
    get:
      tags:
        - Strategies
      operationId: listStrategies
      summary: Lấy danh sách chiến lược giao dịch
      description: |
        Lấy danh sách tất cả chiến lược giao dịch của người dùng. Hỗ trợ phân trang
        và tìm kiếm theo tên để đảm bảo tốc độ tải trang nhanh khi có nhiều chiến lược.
      security:
        - cookieAuth: []
      parameters:
        - name: page
          in: query
          description: Số trang hiện tại.
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: limit
          in: query
          description: Số bản ghi mỗi trang.
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: search
          in: query
          description: Lọc chiến lược theo tên (tìm kiếm gần đúng / ILIKE).
          schema:
            type: string
      responses:
        "200":
          description: Trả về danh sách chiến lược kèm thông tin phân trang.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/StrategySummary"
                  pagination:
                    $ref: "#/components/schemas/PagePagination"
              example:
                data:
                  - id: "c3d4e5f6-a7b8-9012-cdef-123456789012"
                    name: "EMA Crossover Strategy"
                    version: 3
                    status: "Valid"
                    created_at: "2026-02-01T08:00:00Z"
                    updated_at: "2026-02-25T14:30:00Z"
                  - id: "d4e5f6a7-b8c9-0123-defa-234567890123"
                    name: "RSI Reversal"
                    version: 1
                    status: "Draft"
                    created_at: "2026-02-20T10:00:00Z"
                    updated_at: "2026-02-20T10:00:00Z"
                pagination:
                  page: 1
                  limit: 20
                  total: 2
                  total_pages: 1
        "401":
          $ref: "#/components/responses/Unauthorized"

    post:
      tags:
        - Strategies
      operationId: createStrategy
      summary: Tạo mới chiến lược giao dịch
      description: |
        Tạo mới một chiến lược giao dịch. Backend thực hiện Validation:
        - Kiểm tra sự tồn tại của khối Sự kiện (Event Trigger) trong `logic_json`.
        - Kiểm tra tính liên kết của các khối lệnh.

        Phiên bản khởi tạo mặc định là `1`. `logic_json` chứa cấu trúc khối logic
        Blockly dưới định dạng JSON.
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateStrategyRequest"
            example:
              name: "EMA Crossover Strategy"
              logic_json:
                blocks:
                  languageVersion: 0
                  blocks:
                    - type: "event_on_candle_close"
                      fields:
                        TIMEFRAME: "15m"
                      next:
                        block:
                          type: "indicator_ema"
                          fields:
                            PERIOD: 9
                            SOURCE: "close"
              status: "Valid"
      responses:
        "201":
          description: Lưu chiến lược thành công.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  data:
                    $ref: "#/components/schemas/StrategyCreated"
              example:
                message: "Lưu chiến lược thành công."
                data:
                  id: "c3d4e5f6-a7b8-9012-cdef-123456789012"
                  name: "EMA Crossover Strategy"
                  version: 1
                  status: "Valid"
                  created_at: "2026-02-28T10:00:00Z"
        "400":
          description: >-
            Dữ liệu đầu vào không hợp lệ — thiếu khối Sự kiện (Event Trigger),
            JSON structure không đúng, hoặc thiếu trường bắt buộc.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                missingEventTrigger:
                  summary: Thiếu khối Sự kiện
                  value:
                    error:
                      code: "MISSING_EVENT_TRIGGER"
                      message: "Chiến lược phải bắt đầu bằng khối Sự kiện (Event Trigger)."
                invalidJson:
                  summary: JSON structure không hợp lệ
                  value:
                    error:
                      code: "INVALID_JSON_STRUCTURE"
                      message: "Cấu trúc file JSON không hợp lệ. Vui lòng kiểm tra lại định dạng."
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /strategies/{id}:
    get:
      tags:
        - Strategies
      operationId: getStrategy
      summary: Lấy chi tiết chiến lược
      description: |
        Lấy chi tiết một chiến lược, bao gồm toàn bộ cấu trúc khối logic JSON (Blockly).

        Nếu chiến lược đang được sử dụng bởi Bot đang chạy (trạng thái `Running`), Response
        sẽ kèm trường `warning` và `active_bot_ids` để Frontend hiển thị Banner cảnh báo.
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/StrategyId"
      responses:
        "200":
          description: Trả về chi tiết chiến lược kèm logic JSON.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/StrategyDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Chiến lược không tồn tại.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  code: "STRATEGY_NOT_FOUND"
                  message: "Chiến lược không tồn tại."

    put:
      tags:
        - Strategies
      operationId: updateStrategy
      summary: Cập nhật chiến lược
      description: |
        Cập nhật chiến lược hiện có. Mỗi lần cập nhật thành công, `version` tự động tăng
        lên 1 đơn vị phục vụ Audit Log.

        Nếu chiến lược đang được sử dụng bởi Bot đang chạy, hệ thống **vẫn cho phép lưu**
        nhưng kèm cảnh báo: thay đổi chỉ áp dụng cho các phiên chạy mới (Bot đang chạy
        sử dụng Snapshot version cũ).
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/StrategyId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateStrategyRequest"
            example:
              name: "EMA Crossover v2"
              logic_json:
                blocks:
                  languageVersion: 0
                  blocks:
                    - type: "event_on_candle_close"
                      fields:
                        TIMEFRAME: "1h"
                      next:
                        block:
                          type: "indicator_ema"
                          fields:
                            PERIOD: 21
                            SOURCE: "close"
      responses:
        "200":
          description: Cập nhật chiến lược thành công.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  data:
                    $ref: "#/components/schemas/StrategyUpdated"
              example:
                message: "Cập nhật chiến lược thành công."
                data:
                  id: "c3d4e5f6-a7b8-9012-cdef-123456789012"
                  name: "EMA Crossover v2"
                  version: 4
                  status: "Valid"
                  warning: "Chiến lược này đang được sử dụng bởi Bot đang chạy. Các thay đổi của bạn sẽ chỉ áp dụng cho các phiên chạy mới."
                  updated_at: "2026-02-28T11:00:00Z"
        "400":
          description: Dữ liệu đầu vào không hợp lệ.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Chiến lược không tồn tại.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  code: "STRATEGY_NOT_FOUND"
                  message: "Chiến lược không tồn tại."
        "500":
          $ref: "#/components/responses/InternalServerError"

    delete:
      tags:
        - Strategies
      operationId: deleteStrategy
      summary: Xóa chiến lược
      description: |
        Xóa một chiến lược khỏi hệ thống.

        **Ràng buộc toàn vẹn dữ liệu:** Hệ thống bắt buộc kiểm tra — nếu chiến lược
        đang được sử dụng bởi Bot có trạng thái `Running`, thao tác xóa bị **chặn hoàn toàn**
        và trả về lỗi `409 Conflict`. Người dùng phải dừng tất cả Bot liên quan trước khi xóa.
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/StrategyId"
      responses:
        "200":
          description: Đã xóa chiến lược thành công.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
              example:
                message: "Đã xóa chiến lược thành công."
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Chiến lược không tồn tại.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  code: "STRATEGY_NOT_FOUND"
                  message: "Chiến lược không tồn tại."
        "409":
          description: >-
            Chiến lược đang được sử dụng bởi Bot đang chạy. Không thể xóa.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ErrorResponse"
                  - type: object
                    properties:
                      error:
                        type: object
                        properties:
                          active_bot_ids:
                            type: array
                            items:
                              type: string
                              format: uuid
              example:
                error:
                  code: "STRATEGY_IN_USE"
                  message: "Chiến lược đang được sử dụng bởi Bot [BTC Scalper]. Vui lòng dừng Bot trước khi xóa."
                  active_bot_ids:
                    - "e5f6a7b8-c9d0-1234-efab-345678901234"
        "500":
          $ref: "#/components/responses/InternalServerError"

