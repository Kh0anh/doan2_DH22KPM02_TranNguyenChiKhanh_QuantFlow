  /bots:
    get:
      tags:
        - Bots
      operationId: listBots
      summary: Lấy danh sách Bot
      description: |
        Lấy danh sách tất cả Bot của người dùng. Mỗi Bot trả về thông tin tóm tắt gồm:
        tên Bot, chiến lược sử dụng, cặp tiền, trạng thái hoạt động và tổng PnL.
        Hỗ trợ lọc theo trạng thái.
      security:
