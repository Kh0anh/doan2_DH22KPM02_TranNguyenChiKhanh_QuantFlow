  /backtests:
    post:
      tags:
        - Backtests
      operationId: createBacktest
      summary: Khởi tạo phiên Backtest mới
      description: |
        Khởi tạo phiên Backtest mới. Backend tải dữ liệu nến lịch sử từ Database
        (hoặc tự động lấp đầy từ Binance API nếu thiếu — On-demand Sync), chạy logic
        chiến lược, giả lập khớp lệnh và tổng hợp kết quả.

        **Cơ chế giả lập khớp lệnh:**
        - Lệnh **Market**: Giả định khớp tại giá Open nến tiếp theo.
        - Lệnh **Limit**: Khớp dựa trên giá High/Low trong khung thời gian đã chọn.

        **Cơ chế Unit Cost:**
        - Mỗi khối lệnh khi chạy tốn 1 lượng Unit.
        - Mỗi Session giới hạn tối đa `max_unit` (mặc định 1000). Vượt quá sẽ cưỡng chế
          dừng Session đó.

        Request bao gồm đầy đủ tham số cấu hình giả lập: Strategy ID, Symbol, Timeframe,
        Time Range, Vốn ban đầu (Initial Capital), Phí giao dịch (Fee) và giới hạn Unit.
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBacktestRequest"
            example:
              strategy_id: "c3d4e5f6-a7b8-9012-cdef-123456789012"
              symbol: "BTCUSDT"
              start_time: "2025-01-01T00:00:00Z"
              end_time: "2025-12-31T23:59:59Z"
              initial_capital: 1000
              fee_rate: 0.04
              max_unit: 1000
      responses:
        "201":
          description: Phiên Backtest đã được khởi tạo và đang xử lý.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  data:
                    $ref: "#/components/schemas/BacktestCreated"
              example:
                message: "Phiên Backtest đã được khởi tạo."
                data:
                  backtest_id: "a7b8c9d0-e1f2-3456-abcd-567890123456"
                  status: "processing"
                  created_at: "2026-02-28T10:00:00Z"
        "400":
          description: Thiếu tham số bắt buộc hoặc giá trị không hợp lệ.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  code: "MISSING_REQUIRED_FIELDS"
                  message: "Vui lòng cung cấp đầy đủ các tham số: strategy_id, symbol, timeframe, start_time, end_time, initial_capital, fee_rate."
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Chiến lược không tồn tại.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  code: "STRATEGY_NOT_FOUND"
                  message: "Chiến lược không tồn tại."
        "500":
          $ref: "#/components/responses/InternalServerError"

